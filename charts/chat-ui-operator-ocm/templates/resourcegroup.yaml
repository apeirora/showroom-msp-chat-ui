apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: {{ .Values.component.name }}
spec:
  schema:
    apiVersion: v1alpha1
    kind: ChatUiOperatorRelease
  resources:
    - id: ns
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: {{ .Values.operator.targetNamespace }}

    # Fetch Helm chart resource from the OCM component
    - id: resourceChart
      template:
        apiVersion: delivery.ocm.software/v1alpha1
        kind: Resource
        metadata:
          name: {{ .Values.component.name }}-helm-resource
          namespace: {{ .Values.component.namespace }}
        spec:
          interval: {{ .Values.component.interval }}
          sourceRef:
            kind: ComponentVersion
            name: {{ .Values.component.name }}
            namespace: {{ .Values.component.namespace }}
            resourceRef:
              name: oci-helm-chart-chat-ui-operator

    # Fetch operator image resource from the OCM component
    - id: resourceImage
      template:
        apiVersion: delivery.ocm.software/v1alpha1
        kind: Resource
        metadata:
          name: {{ .Values.component.name }}-image-resource
          namespace: {{ .Values.component.namespace }}
        spec:
          interval: {{ .Values.component.interval }}
          sourceRef:
            kind: ComponentVersion
            name: {{ .Values.component.name }}
            namespace: {{ .Values.component.namespace }}
            resourceRef:
              name: chat-ui-image

    - id: ocirepository
      template:
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: OCIRepository
        metadata:
          name: ${ns.metadata.name}-chat-ui-operator
          namespace: ${ns.metadata.name}
        spec:
          interval: {{ .Values.component.interval }}
          layerSelector:
            mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
            operation: copy
          url: oci://${resourceChart.status.additional.?registry}/${resourceChart.status.additional.?repository}
          ref:
            tag: ${resourceChart.status.additional.?tag}
          secretRef:
            name: {{ .Values.operator.imagePullSecretName }}

    - id: helmrelease
      template:
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: ${ns.metadata.name}-chat-ui-operator
          namespace: ${ns.metadata.name}
        spec:
          interval: {{ .Values.component.interval }}
          releaseName: ${ns.metadata.name}-chat-ui-operator
          targetNamespace: ${ns.metadata.name}
          install:
            createNamespace: true
          chartRef:
            kind: OCIRepository
            name: ${ocirepository.metadata.name}
            namespace: ${ns.metadata.name}
          values:
            env:
              PUBLIC_HOST: {{ .Values.operator.publicHost }}
              PUBLIC_SCHEME: {{ .Values.operator.publicScheme }}
              TLS_SECRET_NAME: {{ .Values.operator.tlsSecretName | quote }}
              {{- if .Values.operator.ingressExtraAnnotations }}
              INGRESS_EXTRA_ANNOTATIONS: {{ .Values.operator.ingressExtraAnnotations | toJson | quote }}
              {{- else }}
              INGRESS_EXTRA_ANNOTATIONS: '{}'
              {{- end }}
            image:
              repository: ${resourceImage.status.additional.?registry}/${resourceImage.status.additional.?repository}
              tag: ${resourceImage.status.additional.?tag}
              pullPolicy: {{ .Values.operator.imagePullPolicy }}
              imagePullSecrets:
                - name: {{ .Values.operator.imagePullSecretName }}
