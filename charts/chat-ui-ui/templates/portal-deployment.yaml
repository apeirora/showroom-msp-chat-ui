{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-portal
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chat-ui-ui.labels" . | nindent 4 }}
    app.kubernetes.io/component: portal-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: portal-ui
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "chat-ui-ui.labels" . | nindent 8 }}
        app.kubernetes.io/component: portal-ui
      annotations:
        checksum/portal-config: {{ include (print $.Template.BasePath "/portal-configmap.yaml") . | sha256sum }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- range .Values.imagePullSecrets }}
        - name: {{ .name }}
      {{- end }}
      {{- end }}
      containers:
        - name: nginx
          image: {{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          volumeMounts:
            - name: portal-config
              mountPath: /usr/share/nginx/html/pm-content.json
              subPath: pm-content.json
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
      volumes:
        - name: portal-config
          configMap:
            name: {{ .Release.Name }}-portal-config
            items:
              - key: pm-content.json
                path: pm-content.json
{{- end }}

