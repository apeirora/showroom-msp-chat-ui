{{- if .Values.publishedResources.enabled }}
{{- $ns := (.Values.publishedResources.namespace | default .Release.Namespace) }}
apiVersion: syncagent.kcp.io/v1alpha1
kind: PublishedResource
metadata:
  name: publish-chat-ui-instances
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: chat-ui-sync-agent
    app.kubernetes.io/component: portal-integration
spec:
  resource:
    kind: ChatUIInstance
    apiGroup: ui.privatellms.msp
    version: v1alpha1
  naming:
    namespace: "{{`{{ .ClusterName }}`}}"
    name: "{{`{{ .Object.metadata.name }}`}}"
{{- if .Values.publishedResources.credentialSecrets.enabled }}
  related:
    - identifier: credentials-secret
      origin: kcp
      kind: Secret
      object:
        reference:
          path: spec.credentialsSecretRef.name
{{- end }}
{{- end }}
